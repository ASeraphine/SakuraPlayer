name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0)'
        required: false
        default: '1.0'

permissions:
  contents: write
  actions: read

jobs:

  # ============================================
  # Build JAR (cross-platform, runs on Ubuntu)
  # ============================================
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build JAR
        run: |
          # Compile Java sources
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib/jaudiotagger-3.0.1.jar:lib/batik-all-1.19.jar:lib/svg-salamander-1.1.5.3.jar:lib/jlayer-1.0.1.jar:lib/mp3agic-0.9.0.jar:src" src/*.java -d bin

          # Create executable JAR with Main-Class and Class-Path manifest
          cd bin
          echo "Main-Class: App" > manifest.txt
          echo "Class-Path: jaudiotagger-3.0.1.jar batik-all-1.19.jar svg-salamander-1.1.5.3.jar jlayer-1.0.1.jar mp3agic-0.9.0.jar" >> manifest.txt
          jar cvfm ../SakuraPlayer.jar manifest.txt *.class
          cd ..
          rm -f bin/manifest.txt
          
          # Bundle resources into the JAR
          cd res
          jar uf ../SakuraPlayer.jar .
          cd ..
      
      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SakuraPlayer.jar
          path: SakuraPlayer.jar
          retention-days: 1

  # ============================================
  # Build macOS .app
  # ============================================
  build-macos:
    name: Build macOS .app
    runs-on: macos-latest
    needs: build-jar
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build macOS .app
        run: |
          chmod +x build_mac_app.sh
          ./build_mac_app.sh
      
      - name: Create DMG from .app
        run: |
          # Install create-dmg if not available
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          # Create DMG
          create-dmg \
            --volname "Sakura Player" \
            --volicon "res/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Sakura Player.app" 150 190 \
            --hide-extension "Sakura Player.app" \
            --app-drop-link 450 190 \
            "dist/Sakura Player.dmg" \
            "dist/Sakura Player.app"
      
      - name: Upload macOS DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-macOS
          path: dist/Sakura Player.dmg
          retention-days: 1

  # ============================================
  # Build Windows .exe with bundled JRE
  # ============================================
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Install Launch4j
        run: |
          curl -L -o launch4j.zip "https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-win32.zip/download"
          Expand-Archive -Path launch4j.zip -DestinationPath C:\launch4j-temp
          if (Test-Path "C:\launch4j-temp\launch4j") {
            Move-Item "C:\launch4j-temp\launch4j\*" "C:\launch4j\" -Force
          } else {
            Move-Item "C:\launch4j-temp\*" "C:\launch4j\" -Force
          }
          Remove-Item -Recurse -Force C:\launch4j-temp
          echo "C:\launch4j" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh
      
      - name: Build JAR on Windows
        run: |
          @echo off
          echo Compiling Java sources...
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib/jaudiotagger-3.0.1.jar;lib/batik-all-1.19.jar;lib/svg-salamander-1.1.5.3.jar;lib/jlayer-1.0.1.jar;lib/mp3agic-0.9.0.jar;src" src/*.java -d bin
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          
          echo Creating JAR...
          cd bin
          echo Main-Class: App > manifest.txt
          echo Class-Path: jaudiotagger-3.0.1.jar batik-all-1.19.jar svg-salamander-1.1.5.3.jar jlayer-1.0.1.jar mp3agic-0.9.0.jar >> manifest.txt
          jar cvfm ..\SakuraPlayer.jar manifest.txt *.class
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          cd ..
          del bin\manifest.txt
          
          echo Bundling resources...
          cd res
          jar uf ..\SakuraPlayer.jar .
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          cd ..
          
          echo Verifying JAR...
          dir SakuraPlayer.jar
          jar tf SakuraPlayer.jar | find "App.class"
          if %ERRORLEVEL% neq 0 echo WARNING: App.class not found in JAR!
        shell: cmd
      
      - name: Download JavaFX JMOD files for Windows
        run: |
          echo Downloading JavaFX 25 Windows JMODs...
          curl -L -o javafx-jmods.zip "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_windows-x64_bin-jmods.zip"
          echo Extracting...
          tar -xf javafx-jmods.zip
          echo JavaFX JMODs extracted to: javafx-jmods-25.0.3
          dir javafx-jmods-25.0.3
        shell: cmd
      
      - name: Create custom JRE with jlink
        run: |
          echo "JAVA_HOME: %JAVA_HOME%"
          
          "%JAVA_HOME%\bin\jlink" ^
            --module-path "%JAVA_HOME%\jmods";javafx-jmods-25.0.3 ^
            --add-modules java.base,java.logging,java.desktop,java.xml,jdk.unsupported,javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web ^
            --strip-debug ^
            --no-header-files ^
            --no-man-pages ^
            --compress=2 ^
            --output runtime
        shell: cmd
      
      - name: Build .exe with Launch4j (bundled JRE)
        run: |
          mkdir input
          mkdir dist
          copy SakuraPlayer.jar input\
          C:\launch4j\launch4jc.exe launch4j.xml
        shell: cmd
      
      - name: Create distribution folder
        run: |
          mkdir dist\SakuraPlayer
          copy dist\SakuraPlayer.exe dist\SakuraPlayer\
          copy SakuraPlayer.jar dist\SakuraPlayer\
          xcopy /E /I runtime dist\SakuraPlayer\runtime
          del dist\SakuraPlayer.exe
          
          :: Copy dependency JARs (needed for Class-Path manifest)
          copy lib\jaudiotagger-3.0.1.jar dist\SakuraPlayer\
          copy lib\batik-all-1.19.jar dist\SakuraPlayer\
          copy lib\svg-salamander-1.1.5.3.jar dist\SakuraPlayer\
          copy lib\jlayer-1.0.1.jar dist\SakuraPlayer\
          copy lib\mp3agic-0.9.0.jar dist\SakuraPlayer\
          
          :: Create debug .bat that shows errors
          echo @echo off > dist\SakuraPlayer\SakuraPlayer.bat
          echo title SakuraPlayer Debug >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo SakuraPlayer Debug Launcher >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo If the app does not appear, check the error messages above. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo Checking files... >> dist\SakuraPlayer\SakuraPlayer.bat
          echo if not exist "%%~dp0SakuraPlayer.jar" echo ERROR: SakuraPlayer.jar not found! >> dist\SakuraPlayer\SakuraPlayer.bat
          echo if not exist "%%~dp0runtime\bin\java.exe" echo ERROR: java.exe not found! >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo Running: "%%~dp0runtime\bin\java" -jar "%%~dp0SakuraPlayer.jar" >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo "%%~dp0runtime\bin\java" --enable-native-access=javafx.graphics -jar "%%~dp0SakuraPlayer.jar" >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo App closed. Press any key to exit. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo pause >> dist\SakuraPlayer\SakuraPlayer.bat
        shell: cmd
      
      - name: Create distribution ZIP
        run: |
          cd dist\SakuraPlayer
          tar -a -c -f ..\SakuraPlayer-Windows.zip *
          cd ..\..
        shell: cmd
      
      - name: Upload Windows ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-Windows
          path: dist/SakuraPlayer-Windows.zip
          retention-days: 1

  # ============================================
  # Create Release with all artifacts
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') && always()

    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/ && find artifacts/ -type f
      
      - name: Prepare release files
        run: |
          # Collect all available artifacts into a single directory
          mkdir -p release-files
          if [ -d "artifacts/Sakura-Player-macOS" ]; then
            cp -r artifacts/Sakura-Player-macOS/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/Sakura-Player-Windows" ]; then
            cp -r artifacts/Sakura-Player-Windows/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/SakuraPlayer.jar" ]; then
            cp -r artifacts/SakuraPlayer.jar/* release-files/ 2>/dev/null || true
          fi
          echo "Release files:"
          ls -la release-files/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SakuraPlayer ${{ github.ref_name }}
          body: |
            ## SakuraPlayer ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            **🍎 macOS**
            - `Sakura-Player-macOS.dmg` — Drag to Applications folder and run
            - Requires macOS 13+ (Apple Silicon or Intel)
            
            **🪟 Windows**
            - `SakuraPlayer-Windows.zip` — Portable app with bundled Java, just unzip and run
            
            **📦 Cross-Platform**
            - `SakuraPlayer.jar` — Run with `java -jar SakuraPlayer.jar` (requires Java 25+)
            
            ### 🚀 How to install
            
            **macOS:**
            1. Download `Sakura-Player-macOS.dmg`
            2. Open the DMG and drag `Sakura Player.app` to Applications
            3. Right-click → Open (first time only)
            
            **Windows:**
            1. Download `SakuraPlayer-Windows.zip`
            2. Extract the ZIP to any folder
            3. Double-click `SakuraPlayer.exe` to launch
            4. **No separate Java installation needed!**
            
            **JAR (any OS):**
            ```bash
            java -jar SakuraPlayer.jar
            ```
            
            ### 📋 Requirements
            - **macOS**: macOS 13+ (Ventura or later)
            - **Windows**: Windows 10/11 64-bit
            - **JAR**: Java 25+
          files: release-files/*
          generate_release_notes: true
