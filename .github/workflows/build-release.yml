name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0)'
        required: false
        default: '1.0'

permissions:
  contents: write
  actions: read

jobs:

  # ============================================
  # Build JAR (cross-platform, runs on Ubuntu)
  # ============================================
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build JAR
        run: |
          # Compile Java sources
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib/jaudiotagger-3.0.1.jar:lib/batik-all-1.19.jar:lib/svg-salamander-1.1.5.3.jar:lib/jlayer-1.0.1.jar:lib/mp3agic-0.9.0.jar:lib/jflac-codec-1.5.2.jar:src" src/*.java -d bin

          # Create executable JAR with Main-Class and Class-Path manifest
          cd bin
          echo "Main-Class: App" > manifest.txt
          echo "Class-Path: jaudiotagger-3.0.1.jar batik-all-1.19.jar svg-salamander-1.1.5.3.jar jlayer-1.0.1.jar mp3agic-0.9.0.jar jflac-codec-1.5.2.jar" >> manifest.txt
          jar cvfm ../SakuraPlayer.jar manifest.txt *.class
          cd ..
          rm -f bin/manifest.txt
          
          # Bundle resources into the JAR
          cd res
          jar uf ../SakuraPlayer.jar .
          cd ..
      
      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SakuraPlayer.jar
          path: SakuraPlayer.jar
          retention-days: 1

  # ============================================
  # Build macOS .app
  # ============================================
  build-macos:
    name: Build macOS .app
    runs-on: macos-latest
    needs: build-jar
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build macOS .app
        run: |
          chmod +x build_mac_app.sh
          ./build_mac_app.sh
      
      - name: Create DMG from .app
        run: |
          # Install create-dmg if not available
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          # Create DMG
          create-dmg \
            --volname "Sakura Player" \
            --volicon "res/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Sakura Player.app" 150 190 \
            --hide-extension "Sakura Player.app" \
            --app-drop-link 450 190 \
            "dist/Sakura Player.dmg" \
            "dist/Sakura Player.app"
      
      - name: Upload macOS DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-macOS
          path: dist/Sakura Player.dmg
          retention-days: 1

  # ============================================
  # Build Windows .exe with jpackage (self-contained, like macOS)
  # ============================================
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Download JavaFX 25 SDK for Windows
        shell: pwsh
        run: |
          $javafxDir = "$env:RUNNER_TEMP\javafx-sdk-25.0.3-win"
          if (-not (Test-Path $javafxDir)) {
            New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\tools"
            Write-Host "Downloading JavaFX 25 SDK for Windows..."
            Invoke-WebRequest -Uri "https://download2.gluonhq.com/openjfx/25.0.3/openjfx-25.0.3_windows-x64_bin-sdk.zip" -OutFile "$env:RUNNER_TEMP\javafx25-win.zip"
            Expand-Archive -Path "$env:RUNNER_TEMP\javafx25-win.zip" -DestinationPath "$env:RUNNER_TEMP\tools" -Force
            Rename-Item "$env:RUNNER_TEMP\tools\javafx-sdk-25.0.3" "javafx-sdk-25.0.3-win"
            Remove-Item "$env:RUNNER_TEMP\javafx25-win.zip" -Force
          }
          echo "JAVAFX_DIR=$javafxDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      
      - name: Create javafx-modules directory
        shell: cmd
        run: |
          mkdir javafx-modules
          copy "%JAVAFX_DIR%\lib\javafx.base.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.controls.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.graphics.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.media.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.swing.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.fxml.jar" javafx-modules\
          copy "%JAVAFX_DIR%\lib\javafx.web.jar" javafx-modules\
      
      - name: Compile Java sources
        shell: cmd
        run: |
          javac --module-path "javafx-modules" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib\jaudiotagger-3.0.1.jar;lib\jlayer-1.0.1.jar;lib\mp3agic-0.9.0.jar;src" src\*.java -d bin
      
      - name: Create JAR
        shell: cmd
        run: |
          cd bin
          echo Class-Path: jaudiotagger-3.0.1.jar jlayer-1.0.1.jar mp3agic-0.9.0.jar > ..\manifest.txt
          jar cvfm ..\SakuraPlayer.jar ..\manifest.txt *.class
          cd ..
          del manifest.txt
          
          cd res
          jar uf ..\SakuraPlayer.jar .
          cd ..
      
      - name: Create custom jlink runtime with JavaFX
        shell: cmd
        run: |
          jlink ^
            --module-path "%JAVAFX_DIR%\lib;%JAVA_HOME%\jmods" ^
            --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging,java.desktop,java.naming,java.scripting,jdk.unsupported,jdk.crypto.ec ^
            --output "%RUNNER_TEMP%\custom-runtime" ^
            --no-header-files ^
            --no-man-pages
          
          copy "%JAVAFX_DIR%\bin\decora_sse.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\fxplugins.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\glass.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\glib-lite.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\gstreamer-lite.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\javafx_font.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\javafx_iio.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\jfxmedia.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\jfxwebkit.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\prism_common.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\prism_d3d.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
          copy "%JAVAFX_DIR%\bin\prism_sw.dll" "%RUNNER_TEMP%\custom-runtime\bin\"
      
      - name: Prepare input directory
        shell: cmd
        run: |
          mkdir input
          copy SakuraPlayer.jar input\
          copy lib\jaudiotagger-3.0.1.jar input\
          copy lib\jlayer-1.0.1.jar input\
          copy lib\mp3agic-0.9.0.jar input\
      
      - name: Build .exe with jpackage
        shell: cmd
        run: |
          mkdir dist
          jpackage ^
            --type app-image ^
            --runtime-image "%RUNNER_TEMP%\custom-runtime" ^
            --input "input" ^
            --main-jar SakuraPlayer.jar ^
            --main-class App ^
            --name "Sakura Player" ^
            --icon "res\icon.ico" ^
            --app-version 1.0 ^
            --vendor "Sakura Player" ^
            --copyright "Copyright 2026" ^
            --java-options "-Duser.dir=\\%%APPDIR%%" ^
            --dest "%CD%\dist"
      
      - name: Create distribution ZIP
        shell: cmd
        run: |
          cd dist
          ren "Sakura Player" "SakuraPlayer"
          tar -a -c -f SakuraPlayer-Windows.zip SakuraPlayer
          cd ..
      
      - name: Upload Windows ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-Windows
          path: dist/SakuraPlayer-Windows.zip
          retention-days: 1

  # ============================================
  # Create Release with all artifacts
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') && always()

    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/ && find artifacts/ -type f
      
      - name: Prepare release files
        run: |
          # Collect all available artifacts into a single directory
          mkdir -p release-files
          if [ -d "artifacts/Sakura-Player-macOS" ]; then
            cp -r artifacts/Sakura-Player-macOS/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/Sakura-Player-Windows" ]; then
            cp -r artifacts/Sakura-Player-Windows/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/SakuraPlayer.jar" ]; then
            cp -r artifacts/SakuraPlayer.jar/* release-files/ 2>/dev/null || true
          fi
          echo "Release files:"
          ls -la release-files/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SakuraPlayer ${{ github.ref_name }}
          body: |
            ## SakuraPlayer ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            **🍎 macOS**
            - `Sakura-Player-macOS.dmg` — Drag to Applications folder and run
            - Requires macOS 13+ (Apple Silicon or Intel)
            
            **🪟 Windows**
            - `SakuraPlayer-Windows.zip` — Portable app with bundled Java, just unzip and run
            
            **📦 Cross-Platform**
            - `SakuraPlayer.jar` — Run with `java -jar SakuraPlayer.jar` (requires Java 25+)
            
            ### 🚀 How to install
            
            **macOS:**
            1. Download `Sakura-Player-macOS.dmg`
            2. Open the DMG and drag `Sakura Player.app` to Applications
            3. Right-click → Open (first time only)
            
            **Windows:**
            1. Download `SakuraPlayer-Windows.zip`
            2. Extract the ZIP to any folder
            3. Double-click `SakuraPlayer.exe` to launch
            4. **No separate Java installation needed!**
            
            **JAR (any OS):**
            ```bash
            java -jar SakuraPlayer.jar
            ```
            
            ### 📋 Requirements
            - **macOS**: macOS 13+ (Ventura or later)
            - **Windows**: Windows 10/11 64-bit
            - **JAR**: Java 25+
          files: release-files/*
          generate_release_notes: true
