name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0)'
        required: false
        default: '1.0'

permissions:
  contents: write
  actions: read

jobs:

  # ============================================
  # Build JAR (cross-platform, runs on Ubuntu)
  # ============================================
  build-jar:
    name: Build JAR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build JAR
        run: |
          # Compile Java sources
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib/jaudiotagger-3.0.1.jar:lib/batik-all-1.19.jar:lib/svg-salamander-1.1.5.3.jar:lib/jlayer-1.0.1.jar:lib/mp3agic-0.9.0.jar:src" src/*.java -d bin

          # Create executable JAR with Main-Class manifest
          cd bin
          jar cvfe ../SakuraPlayer.jar App *
          cd ..
          
          # Bundle resources into the JAR
          cd res
          jar uf ../SakuraPlayer.jar .
          cd ..
          
          # Create a fat JAR by extracting and repackaging all non-JavaFX dependency JARs
          mkdir -p temp-lib
          for jar in lib/jaudiotagger-3.0.1.jar lib/batik-all-1.19.jar lib/svg-salamander-1.1.5.3.jar lib/jlayer-1.0.1.jar lib/mp3agic-0.9.0.jar; do
            cd temp-lib
            jar xf ../$jar
            cd ..
          done
          
          # Extract the main JAR into the same temp directory
          cd temp-lib
          jar xf ../SakuraPlayer.jar
          cd ..
          
          # Repackage everything into a single fat JAR, preserving Main-Class
          cd temp-lib
          jar cfm ../SakuraPlayer.jar META-INF/MANIFEST.MF .
          cd ..
          rm -rf temp-lib
      
      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SakuraPlayer.jar
          path: SakuraPlayer.jar
          retention-days: 1

  # ============================================
  # Build macOS .app
  # ============================================
  build-macos:
    name: Build macOS .app
    runs-on: macos-latest
    needs: build-jar
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build macOS .app
        run: |
          chmod +x build_mac_app.sh
          ./build_mac_app.sh
      
      - name: Create DMG from .app
        run: |
          # Install create-dmg if not available
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          # Create DMG
          create-dmg \
            --volname "Sakura Player" \
            --volicon "res/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Sakura Player.app" 150 190 \
            --hide-extension "Sakura Player.app" \
            --app-drop-link 450 190 \
            "dist/Sakura Player.dmg" \
            "dist/Sakura Player.app"
      
      - name: Upload macOS DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-macOS
          path: dist/Sakura Player.dmg
          retention-days: 1

  # ============================================
  # Build Windows Portable App (bundled JRE)
  # ============================================
  build-windows:
    name: Build Windows Portable
    runs-on: windows-latest
    needs: build-jar
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Download fat JAR from build-jar job
        uses: actions/download-artifact@v4
        with:
          name: SakuraPlayer.jar
          path: .
      
      - name: Create custom JRE with jlink
        run: |
          echo "JAVA_HOME: %JAVA_HOME%"
          
          "%JAVA_HOME%\bin\jlink" ^
            --module-path "%JAVA_HOME%\jmods";lib ^
            --add-modules java.base,java.logging,java.desktop,java.xml,jdk.unsupported,javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web ^
            --strip-debug ^
            --no-header-files ^
            --no-man-pages ^
            --compress=2 ^
            --output runtime
        shell: cmd
      
      - name: Create portable app folder
        run: |
          mkdir dist
          mkdir dist\SakuraPlayer
          
          # Copy the custom JRE
          xcopy /E /I runtime dist\SakuraPlayer\runtime
          
          # Copy the JAR
          copy SakuraPlayer.jar dist\SakuraPlayer\
          
          # Copy resources
          xcopy /E /I res dist\SakuraPlayer\res
          
          # Create launcher batch file
          echo @echo off > dist\SakuraPlayer\SakuraPlayer.bat
          echo title SakuraPlayer >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo SakuraPlayer is starting... >> dist\SakuraPlayer\SakuraPlayer.bat
          echo echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo "%%~dp0runtime\bin\java" -Duser.dir=%%~dp0 -jar "%%~dp0SakuraPlayer.jar" >> dist\SakuraPlayer\SakuraPlayer.bat
          echo if errorlevel 1 ( >> dist\SakuraPlayer\SakuraPlayer.bat
          echo   echo. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo   echo ERROR: SakuraPlayer failed to start. >> dist\SakuraPlayer\SakuraPlayer.bat
          echo   pause >> dist\SakuraPlayer\SakuraPlayer.bat
          echo ) >> dist\SakuraPlayer\SakuraPlayer.bat
          
          # Create a VBS script to run without console window
          echo Set WshShell = CreateObject("WScript.Shell") > dist\SakuraPlayer\SakuraPlayer.vbs
          echo WshShell.Run chr(34) ^& "%%~dp0runtime\bin\javaw" ^& chr(34) ^& " -Duser.dir=" ^& chr(34) ^& "%%~dp0" ^& chr(34) ^& " -jar " ^& chr(34) ^& "%%~dp0SakuraPlayer.jar" ^& chr(34), 0, False >> dist\SakuraPlayer\SakuraPlayer.vbs
          
          echo Done creating portable app
        shell: cmd
      
      - name: Create portable ZIP
        run: |
          cd dist
          tar -a -c -f SakuraPlayer-Windows.zip SakuraPlayer
          cd ..
        shell: cmd
      
      - name: Upload Windows portable ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-Windows
          path: dist/SakuraPlayer-Windows.zip
          retention-days: 1

  # ============================================
  # Create Release with all artifacts
  # ============================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-jar, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v') && always()

    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: ls -la artifacts/ && find artifacts/ -type f
      
      - name: Prepare release files
        run: |
          # Collect all available artifacts into a single directory
          mkdir -p release-files
          if [ -d "artifacts/Sakura-Player-macOS" ]; then
            cp -r artifacts/Sakura-Player-macOS/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/Sakura-Player-Windows" ]; then
            cp -r artifacts/Sakura-Player-Windows/* release-files/ 2>/dev/null || true
          fi
          if [ -d "artifacts/SakuraPlayer.jar" ]; then
            cp -r artifacts/SakuraPlayer.jar/* release-files/ 2>/dev/null || true
          fi
          echo "Release files:"
          ls -la release-files/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SakuraPlayer ${{ github.ref_name }}
          body: |
            ## SakuraPlayer ${{ github.ref_name }}
            
            ### 📦 Downloads
            
            **🍎 macOS**
            - `Sakura-Player-macOS.dmg` — Drag to Applications folder and run
            - Requires macOS 13+ (Apple Silicon or Intel)
            
            **🪟 Windows**
            - `SakuraPlayer-Windows.zip` — Portable app with bundled Java, just unzip and run
            
            **📦 Cross-Platform**
            - `SakuraPlayer.jar` — Run with `java -jar SakuraPlayer.jar` (requires Java 25+)
            
            ### 🚀 How to install
            
            **macOS:**
            1. Download `Sakura-Player-macOS.dmg`
            2. Open the DMG and drag `Sakura Player.app` to Applications
            3. Right-click → Open (first time only)
            
            **Windows:**
            1. Download `SakuraPlayer-Windows.zip`
            2. Extract the ZIP to any folder
            3. Double-click `SakuraPlayer.bat` to launch
            4. **No separate Java installation needed!**
            
            **JAR (any OS):**
            ```bash
            java -jar SakuraPlayer.jar
            ```
            
            ### 📋 Requirements
            - **macOS**: macOS 13+ (Ventura or later)
            - **Windows**: Windows 10/11 64-bit
            - **JAR**: Java 25+
          files: release-files/*
          generate_release_notes: true
