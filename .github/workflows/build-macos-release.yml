name: Build and Release macOS .app

on:
  workflow_dispatch:

    inputs:
      version:
        description: 'Release version (e.g., 1.0)'
        required: false
        default: '1.0'

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Build macOS .app
        run: |
          chmod +x build_mac_app.sh
          ./build_mac_app.sh
      
      - name: Create DMG from .app
        run: |
          # Install create-dmg if not available
          if ! command -v create-dmg &> /dev/null; then
            brew install create-dmg
          fi
          
          # Create DMG
          create-dmg \
            --volname "Sakura Player" \
            --volicon "res/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Sakura Player.app" 150 190 \
            --hide-extension "Sakura Player.app" \
            --app-drop-link 450 190 \
            "dist/Sakura Player.dmg" \
            "dist/Sakura Player.app"
      
      - name: Upload macOS .app as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-macOS
          path: dist/Sakura Player.app/
      
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-macOS-DMG
          path: dist/Sakura Player.dmg
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: SakuraPlayer ${{ github.ref_name }}
          body: |
            ## SakuraPlayer ${{ github.ref_name }}
            
            ### 📦 Downloads
            - **Sakura Player.dmg** — macOS app bundle (drag to Applications folder)
            - **Sakura Player.app** — macOS app directory
            
            ### 🚀 How to install on macOS
            1. Download `Sakura Player.dmg`
            2. Open the DMG and drag `Sakura Player.app` to your Applications folder
            3. Right-click → Open (first time only, to bypass Gatekeeper)
            
            ### 📋 Requirements
            - macOS 13+ (Ventura or later)
            - Apple Silicon (M1/M2/M3/M4) or Intel Mac
          files: |
            dist/Sakura Player.dmg
          generate_release_notes: true
