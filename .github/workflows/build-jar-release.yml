name: Build and Release JAR

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0, v2.0, etc.
  workflow_dispatch:  # Also allow manual trigger
    inputs:
      version:
        description: 'Release version (e.g., 1.0)'
        required: false
        default: '1.0'

jobs:
  build-jar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      
      - name: Build JAR
        run: |
          # Compile Java sources
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web -cp "lib/jaudiotagger-3.0.1.jar:lib/batik-all-1.19.jar:lib/svg-salamander-1.1.5.3.jar:lib/jlayer-1.0.1.jar:lib/mp3agic-0.9.0.jar:src" src/*.java -d bin
          
          # Create executable JAR
          cd bin
          jar cvfe ../SakuraPlayer.jar App *
          cd ..
          
          # Bundle resources into the JAR
          cd res
          jar uf ../SakuraPlayer.jar .
          cd ..
          
          # Create a fat JAR by extracting and repackaging all dependency JARs
          # First, extract all non-JavaFX dependency JARs into a temp directory
          mkdir -p temp-lib
          for jar in lib/jaudiotagger-3.0.1.jar lib/batik-all-1.19.jar lib/svg-salamander-1.1.5.3.jar lib/jlayer-1.0.1.jar lib/mp3agic-0.9.0.jar; do
            cd temp-lib
            jar xf ../$jar
            cd ..
          done
          
          # Extract the main JAR into the same temp directory
          cd temp-lib
          jar xf ../SakuraPlayer.jar
          cd ..
          
          # Repackage everything into a single fat JAR
          cd temp-lib
          jar cfm ../SakuraPlayer.jar META-INF/MANIFEST.MF .
          cd ..
          rm -rf temp-lib
      
      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SakuraPlayer.jar
          path: SakuraPlayer.jar
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: SakuraPlayer ${{ github.ref_name }}
          body: |
            ## SakuraPlayer ${{ github.ref_name }}
            
            Download the JAR file below to run SakuraPlayer on any platform with Java 23+ installed.
            
            ### How to run:
            ```bash
            java -jar SakuraPlayer.jar
            ```
          files: SakuraPlayer.jar
          generate_release_notes: true
