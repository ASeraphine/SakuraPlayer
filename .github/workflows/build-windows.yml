name: Build Windows .exe

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Install Launch4j
        run: |
          # Download Launch4j from sourceforge
          curl -L -o launch4j.zip "https://sourceforge.net/projects/launch4j/files/launch4j-3/3.50/launch4j-3.50-win32.zip/download"
          Expand-Archive -Path launch4j.zip -DestinationPath C:\launch4j-temp
          # Move contents to C:\launch4j (handles nested folder from zip)
          if (Test-Path "C:\launch4j-temp\launch4j") {
            Move-Item "C:\launch4j-temp\launch4j\*" "C:\launch4j\" -Force
          } else {
            Move-Item "C:\launch4j-temp\*" "C:\launch4j\" -Force
          }
          Remove-Item -Recurse -Force C:\launch4j-temp
          echo "C:\launch4j" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh
      
      - name: Debug - Check Launch4j installation
        run: |
          dir C:\launch4j\*.exe
        shell: cmd
      
      - name: Build JAR
        run: |
          # Compile Java sources
          javac --module-path "lib" --add-modules javafx.controls,javafx.media,javafx.swing,javafx.fxml,javafx.web,java.logging -cp "lib\jaudiotagger-3.0.1.jar;lib\jlayer-1.0.1.jar;lib\mp3agic-0.9.0.jar;lib\svg-salamander-1.1.5.3.jar;src" src\*.java -d bin

          
          # Create executable JAR with Class-Path manifest
          cd bin
          echo Class-Path: jaudiotagger-3.0.1.jar jlayer-1.0.1.jar mp3agic-0.9.0.jar > ..\manifest.txt
          jar cvfm ..\SakuraPlayer.jar ..\manifest.txt *.class
          cd ..
          del manifest.txt
          
          # Bundle resources into the JAR
          cd res
          jar uf ..\SakuraPlayer.jar .
          cd ..
        shell: cmd
      
      - name: Prepare input directory for Launch4j
        run: |
          mkdir input
          mkdir input\lib
          copy SakuraPlayer.jar input\
          copy lib\jaudiotagger-3.0.1.jar input\lib\
          copy lib\jlayer-1.0.1.jar input\lib\
          copy lib\mp3agic-0.9.0.jar input\lib\
          copy lib\javafx.base.jar input\lib\
          copy lib\javafx.controls.jar input\lib\
          copy lib\javafx.graphics.jar input\lib\
          copy lib\javafx.media.jar input\lib\
          copy lib\javafx.swing.jar input\lib\
          copy lib\javafx.fxml.jar input\lib\
          copy lib\javafx.web.jar input\lib\
        shell: cmd
      
      - name: Build .exe with Launch4j
        run: |
          mkdir dist
          C:\launch4j\launch4jc.exe launch4j.xml
        shell: cmd
      
      - name: Upload .exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sakura-Player-Windows
          path: dist/*.exe
